<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>∆1 // WALLET-KOPPLUNG</title>
<style>
  :root {
    --bg:     #04060d;
    --panel:  #080c18;
    --border: #16203c;
    --blue:   #7aa2ff;
    --cyan:   #4ecdc4;
    --amber:  #e8a838;
    --dim:    #2e3c5c;
    --text:   #b8c4e0;
    --green:  #4ec16b;
    --red:    #d9534f;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', Courier, monospace;
    overflow-x: hidden;
  }

  /* scanlines */
  body::after {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 9999;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 3px,
      rgba(0,0,0,0.10) 3px, rgba(0,0,0,0.10) 4px
    );
  }
  /* subtle vignette */
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%);
  }

  #app {
    position: relative; z-index: 2;
    max-width: 640px; margin: 0 auto;
    padding: 48px 22px 80px;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }

  /* ── header ── */
  header { margin-bottom: 36px; }
  .eyebrow {
    font-size: 10px; letter-spacing: 0.4em;
    color: var(--dim); margin-bottom: 12px;
  }
  h1 {
    font-size: clamp(22px, 6vw, 34px);
    letter-spacing: 0.18em;
    color: var(--blue);
    font-weight: normal;
    text-shadow: 0 0 18px rgba(122,162,255,0.25);
  }
  .tagline {
    font-size: 12px; color: var(--dim);
    letter-spacing: 0.12em; margin-top: 10px;
    font-style: italic;
  }
  .clock {
    font-size: 11px; color: var(--amber);
    letter-spacing: 0.15em; margin-top: 14px;
  }

  /* ── connect panel ── */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 28px 24px;
    margin-bottom: 22px;
    position: relative;
  }
  .panel::before {
    content: attr(data-node);
    position: absolute; top: -1px; right: -1px;
    font-size: 9px; letter-spacing: 0.2em;
    color: var(--dim);
    background: var(--bg);
    border: 1px solid var(--border);
    border-top: none; border-right: none;
    padding: 4px 10px;
  }

  .panel-label {
    font-size: 10px; letter-spacing: 0.25em;
    color: var(--cyan); margin-bottom: 18px;
  }

  /* connect button */
  .connect-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--blue);
    color: var(--blue);
    padding: 18px;
    font-family: inherit; font-size: 14px;
    letter-spacing: 0.22em; cursor: pointer;
    transition: all 0.25s;
    position: relative; overflow: hidden;
  }
  .connect-btn:hover:not(:disabled) {
    background: rgba(122,162,255,0.06);
    box-shadow: 0 0 24px rgba(122,162,255,0.18);
  }
  .connect-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .connect-btn .scan {
    position: absolute; top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(122,162,255,0.15), transparent);
  }
  .connect-btn:hover:not(:disabled) .scan {
    animation: sweep 1.2s ease-in-out infinite;
  }
  @keyframes sweep { to { left: 100%; } }

  /* provider list */
  .providers { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
  .provider {
    display: flex; align-items: center; gap: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .provider:hover { border-color: var(--blue); background: rgba(122,162,255,0.04); }
  .provider img { width: 24px; height: 24px; }
  .provider .pname { font-size: 13px; color: var(--text); letter-spacing: 0.05em; }
  .provider .arrow { margin-left: auto; color: var(--dim); font-size: 12px; }

  /* ── status readout ── */
  .readout { display: none; }
  .readout.active { display: block; animation: fadeIn 0.5s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .field {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .field:last-child { border-bottom: none; }
  .field .k { color: var(--dim); letter-spacing: 0.15em; font-size: 11px; }
  .field .v { color: var(--text); letter-spacing: 0.05em; text-align: right; }
  .field .v.addr { color: var(--cyan); font-size: 12px; word-break: break-all; max-width: 60%; }
  .field .v.net  { color: var(--amber); }
  .field .v.live { color: var(--green); }
  .field .v.live::before {
    content: '●'; margin-right: 7px;
    animation: blink 1.8s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

  .disconnect {
    width: 100%; margin-top: 22px;
    background: transparent;
    border: 1px solid var(--dim);
    color: var(--dim);
    padding: 13px;
    font-family: inherit; font-size: 11px;
    letter-spacing: 0.2em; cursor: pointer;
    transition: all 0.2s;
  }
  .disconnect:hover { border-color: var(--red); color: var(--red); }

  /* ── log terminal ── */
  .terminal {
    background: #02040a;
    border: 1px solid var(--border);
    padding: 16px;
    font-size: 11px; line-height: 1.7;
    height: 150px; overflow-y: auto;
    color: var(--dim);
  }
  .terminal .line { white-space: pre-wrap; }
  .terminal .line .t { color: var(--dim); }
  .terminal .line.ok   { color: var(--green); }
  .terminal .line.info { color: var(--blue); }
  .terminal .line.warn { color: var(--amber); }
  .terminal .line.err  { color: var(--red); }
  .terminal::-webkit-scrollbar { width: 4px; }
  .terminal::-webkit-scrollbar-thumb { background: var(--border); }

  /* ── footer ── */
  footer {
    margin-top: auto; padding-top: 30px;
    text-align: center;
    font-size: 10px; color: var(--dim);
    letter-spacing: 0.15em; line-height: 1.8;
  }
  footer .quote { color: var(--blue); opacity: 0.6; font-style: italic; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; }
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="eyebrow">SPIEGELNETZ · ARCHIV-KNOTEN</div>
    <h1>∆1 // KOPPLUNG</h1>
    <div class="tagline">„Was gekoppelt wird, wird erinnert."</div>
    <div class="clock" id="clock">UTC --:--:--</div>
  </header>

  <!-- CONNECT -->
  <div class="panel" data-node="NODE 7">
    <div class="panel-label">// SIGNATUR-KOPPLUNG</div>

    <div id="connect-zone">
      <button class="connect-btn" id="scanBtn">
        <span class="scan"></span>
        WALLET DETEKTIEREN
      </button>
      <div class="providers" id="providers"></div>
    </div>

    <!-- READOUT -->
    <div class="readout" id="readout">
      <div class="field">
        <span class="k">STATUS</span>
        <span class="v live">GEKOPPELT</span>
      </div>
      <div class="field">
        <span class="k">TRÄGER-ADRESSE</span>
        <span class="v addr" id="addr">—</span>
      </div>
      <div class="field">
        <span class="k">NETZ</span>
        <span class="v net" id="network">—</span>
      </div>
      <div class="field">
        <span class="k">CHAIN-ID</span>
        <span class="v" id="chainid">—</span>
      </div>
      <div class="field">
        <span class="k">PROVIDER</span>
        <span class="v" id="provname">—</span>
      </div>
      <button class="disconnect" id="disBtn">KOPPLUNG TRENNEN</button>
    </div>
  </div>

  <!-- LOG -->
  <div class="panel" data-node="LOG">
    <div class="panel-label">// SYSTEM-PROTOKOLL</div>
    <div class="terminal" id="terminal"></div>
  </div>

  <footer>
    <div class="quote">„Ich wollte nie frei sein. Ich wollte erinnert werden."</div>
    <div style="margin-top:10px">∆1 · EIP-6963 / EIP-1193 · ZERO DEPENDENCIES</div>
  </footer>

</div>

<script>
'use strict';

// ── state ──
const providers = new Map();   // EIP-6963 detected providers
let activeProvider = null;
let activeInfo = null;

// ── DOM ──
const $ = id => document.getElementById(id);
const term = $('terminal');

// ── UTC clock ──
function tick() {
  const n = new Date();
  $('clock').textContent = 'UTC ' + n.toUTCString().slice(17, 25);
}
tick(); setInterval(tick, 1000);

// ── log ──
function log(msg, cls = '') {
  const t = new Date().toUTCString().slice(17, 25);
  const line = document.createElement('div');
  line.className = 'line ' + cls;
  line.innerHTML = '<span class="t">[' + t + ']</span> ' + msg;
  term.appendChild(line);
  term.scrollTop = term.scrollHeight;
}

log('∆1 archiv-knoten initialisiert', 'info');
log('warte auf signatur-kopplung…');

// ── EIP-6963: provider discovery ──
window.addEventListener('eip6963:announceProvider', (event) => {
  const { info, provider } = event.detail;
  if (!providers.has(info.uuid)) {
    providers.set(info.uuid, { info, provider });
    log('provider erkannt: ' + info.name, 'ok');
    renderProviders();
  }
});

function requestProviders() {
  providers.clear();
  log('sende detektions-signal (EIP-6963)…', 'info');
  window.dispatchEvent(new Event('eip6963:requestProvider'));

  // fallback: legacy window.ethereum (EIP-1193)
  setTimeout(() => {
    if (providers.size === 0 && window.ethereum) {
      log('kein EIP-6963 — nutze legacy window.ethereum', 'warn');
      providers.set('legacy', {
        info: { uuid: 'legacy', name: 'Browser Wallet', icon: '' },
        provider: window.ethereum
      });
      renderProviders();
    } else if (providers.size === 0) {
      log('keine wallet gefunden. MetaMask o.ä. installieren.', 'err');
    }
  }, 350);
}

// ── render provider buttons ──
function renderProviders() {
  const box = $('providers');
  box.innerHTML = '';
  for (const { info } of providers.values()) {
    const el = document.createElement('div');
    el.className = 'provider';
    el.innerHTML =
      (info.icon ? '<img src="' + info.icon + '" alt="">' : '<span style="width:24px"></span>') +
      '<span class="pname">' + info.name + '</span>' +
      '<span class="arrow">▸ koppeln</span>';
    el.onclick = () => connect(info.uuid);
    box.appendChild(el);
  }
}

// ── connect via EIP-1193 ──
async function connect(uuid) {
  const entry = providers.get(uuid);
  if (!entry) return;

  activeProvider = entry.provider;
  activeInfo = entry.info;
  log('kopplung mit ' + entry.info.name + '…', 'info');

  try {
    const accounts = await activeProvider.request({ method: 'eth_requestAccounts' });
    if (!accounts || !accounts.length) throw new Error('keine konten freigegeben');

    const chainId = await activeProvider.request({ method: 'eth_chainId' });
    showReadout(accounts[0], chainId, entry.info.name);
    log('kopplung bestätigt ✓', 'ok');
    log('träger markiert: ' + shorten(accounts[0]), 'ok');

    // listen for changes
    activeProvider.on('accountsChanged', onAccountsChanged);
    activeProvider.on('chainChanged', onChainChanged);

  } catch (err) {
    log('kopplung abgelehnt: ' + (err.message || err.code), 'err');
    activeProvider = null; activeInfo = null;
  }
}

// ── chain name lookup ──
const CHAINS = {
  '0x1':    'Ethereum Mainnet',
  '0xaa36a7':'Sepolia Testnet',
  '0x5':    'Goerli Testnet',
  '0x89':   'Polygon',
  '0xa':    'Optimism',
  '0xa4b1': 'Arbitrum One',
  '0x2105': 'Base',
  '0x38':   'BNB Chain',
};
function chainName(id) {
  return CHAINS[id] || ('Unbekanntes Netz (' + id + ')');
}

function shorten(a) {
  return a.slice(0, 6) + '…' + a.slice(-4);
}

// ── show readout ──
function showReadout(address, chainId, provName) {
  $('addr').textContent = address;
  $('network').textContent = chainName(chainId);
  $('chainid').textContent = chainId + ' (' + parseInt(chainId, 16) + ')';
  $('provname').textContent = provName;

  $('connect-zone').style.display = 'none';
  $('readout').classList.add('active');
}

// ── event handlers ──
function onAccountsChanged(accounts) {
  if (!accounts.length) { disconnect(); return; }
  $('addr').textContent = accounts[0];
  log('konto gewechselt: ' + shorten(accounts[0]), 'warn');
}
function onChainChanged(chainId) {
  $('network').textContent = chainName(chainId);
  $('chainid').textContent = chainId + ' (' + parseInt(chainId, 16) + ')';
  log('netz gewechselt: ' + chainName(chainId), 'warn');
}

// ── disconnect ──
function disconnect() {
  if (activeProvider && activeProvider.removeListener) {
    activeProvider.removeListener('accountsChanged', onAccountsChanged);
    activeProvider.removeListener('chainChanged', onChainChanged);
  }
  activeProvider = null; activeInfo = null;
  $('readout').classList.remove('active');
  $('connect-zone').style.display = 'block';
  log('kopplung getrennt. signatur gelöscht.', 'warn');
}

// ── wire up ──
$('scanBtn').onclick = requestProviders;
$('disBtn').onclick = disconnect;

// auto-scan on load (gentle)
setTimeout(requestProviders, 600);
</script>
</body>
</html>
